<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- Top Navigation / Logo Area -->
<div class="w-full flex items-center bg-transparent p-4 absolute top-0 z-20 justify-between">
<div class="text-white flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-3xl">landscape</span>
</div>
<h2 class="text-white text-xl font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">hikr</h2>
</div>
<!-- Hero Image Section (adapted for Phone view) -->
<div class="w-full relative h-[45vh] min-h-[320px]">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Majestic mountain peak during golden hour sunrise" style='background-image: linear-gradient(to bottom, rgba(16, 34, 16, 0.4) 0%, rgba(16, 34, 16, 0.9) 100%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuDMVsB5p1sAHG-N5_vlEp-H0r47thAPzS_UqI7U4JeRKkMCeNGOD5nib1fMfyIv87MDPcXbPM-2cUVJtMZViyflQXNrq8s77AD6xeKIq1IHlZ675JdJP9T_xUMpS8MD8t3hqbSuyiV44rLSTkXaK2_2TSgWPpuIn_Q1zFNtI5cxTBGnoV766Xw6XV113iPqU7utFJ2O3T2XY30DQx3A-3noDAglxYtLEROQxg8Db_DZYXDIQFpGmW3nA9rfXkF1Q3-P5DFyyUhRJ4eg");'>
</div>
<div class="relative z-10 h-full flex flex-col justify-end px-6 pb-12">
<h1 class="text-white text-4xl font-bold leading-tight">Plan. Hike.<br/>Share.</h1>
<p class="text-primary font-medium mt-2">Your next peak awaits</p>
</div>
</div>
<!-- Login Form Card -->
<div class="w-full -mt-8 relative z-30 bg-white dark:bg-[#193319] rounded-t-3xl px-6 pt-10 pb-12 shadow-2xl flex-1 flex flex-col max-w-md">
<div class="mb-8">
<h2 class="text-slate-900 dark:text-white text-2xl font-bold">Welcome back</h2>
<p class="text-slate-500 dark:text-[#92c992] text-sm mt-1">Sign in to your hiker community</p>
</div>
<!-- Email Field -->
<div class="flex flex-col w-full mb-4">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-white text-sm font-medium leading-normal pb-2 px-1">Email Address</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-[#326732] bg-slate-50 dark:bg-[#102210] h-14 placeholder:text-slate-400 dark:placeholder:text-[#92c992]/50 px-4 text-base font-normal" placeholder="e.g., alex@hikr.com" type="email"/>
</label>
</div>
<!-- Password Field -->
<div class="flex flex-col w-full mb-4">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-white text-sm font-medium leading-normal pb-2 px-1">Password</p>
<div class="relative flex w-full items-stretch">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-[#326732] bg-slate-50 dark:bg-[#102210] h-14 placeholder:text-slate-400 dark:placeholder:text-[#92c992]/50 px-4 pr-12 text-base font-normal" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-[#92c992] hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between px-1 mb-8">
<label class="flex items-center gap-2 cursor-pointer">
<input class="w-5 h-5 rounded border-slate-300 dark:border-[#326732] text-primary focus:ring-primary bg-slate-50 dark:bg-[#102210]" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-[#92c992]">Remember me</span>
</label>
<a class="text-sm font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold text-lg h-14 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mb-8">
            Login
        </button>
<!-- Divider -->
<div class="flex items-center gap-4 mb-8">
<div class="h-px bg-slate-200 dark:bg-[#326732] flex-1"></div>
<span class="text-xs font-bold text-slate-400 dark:text-[#92c992] uppercase tracking-wider">Or continue with</span>
<div class="h-px bg-slate-200 dark:bg-[#326732] flex-1"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4 mb-10">
<button class="flex items-center justify-center gap-2 h-12 rounded-xl border border-slate-200 dark:border-[#326732] bg-white dark:bg-[#102210] hover:bg-slate-50 dark:hover:bg-[#193319] transition-colors">
<img alt="" class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDH98zHPwsPBYEBVKGEb68nit3F-CDvd4cFNHVy_UnjcRQ6XWPp91kDDQ9UzhG3ymI4uwAlNlyXPrefiUhmaD8dF6FSvwZvAV-YYyUKkUfY-CddZeooTbCZi6PhynTqEWXjPLuU2v1tOhILlsebZiZ-AQN3-k9tBE1lKkJFmzoyJnyE8xmxPFU7aTWMszChA_YIjnD5vlbOl2MCdm66J5sq3Zt6bzC4h9YnfSwEOe9LHdDLqk2uV5PZIYqAH8Qo5EcvOssP6NhUrdrl"/>
<span class="text-sm font-bold text-slate-700 dark:text-white">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-12 rounded-xl border border-slate-200 dark:border-[#326732] bg-white dark:bg-[#102210] hover:bg-slate-50 dark:hover:bg-[#193319] transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-white">brand_family</span>
<span class="text-sm font-bold text-slate-700 dark:text-white">Apple</span>
</button>
</div>
<!-- Register Link -->
<div class="mt-auto text-center">
<p class="text-slate-500 dark:text-[#92c992] text-sm">
                New to hikr? 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Bottom Safe Area Spacer -->
<div class="h-8 w-full bg-white dark:bg-[#193319]"></div>
</body></html>
