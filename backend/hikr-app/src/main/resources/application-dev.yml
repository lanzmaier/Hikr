server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hikr}
    username: ${DB_USER:hikr}
    password: ${DB_PASSWORD:hikr}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/hikr}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8081/realms/hikr/protocol/openid-connect/certs}

management:
  endpoint:
    health:
      probes:
        enabled: true

keycloak:
  admin:
    url: ${KEYCLOAK_URL:http://localhost:8081}
    login-realm: ${KEYCLOAK_ADMIN_LOGIN_REALM:master}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
    grant-type: password
  
  app:
    realm: ${KEYCLOAK_REALM:hikr}
    client-id: ${KEYCLOAK_APP_CLIENT_ID:hikr-app}
    client-secret: ${KEYCLOAK_APP_CLIENT_SECRET:zEjt1Uw7mrp9AzEHNMsTCmreR6Olbxbh}
