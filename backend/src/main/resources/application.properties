# Hikr Backend - Spring Boot Configuration

spring.application.name=hikr-backend

# Server
server.port=8080
server.servlet.context-path=/api/v1
server.compression.enabled=true

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/hikr_db
spring.datasource.username=hikr
spring.datasource.password=hikr_dev_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL15Dialect
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Redis
spring.redis.host=localhost
spring.redis.port=6379

# Logging
logging.level.root=INFO
logging.level.com.hikr=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Security
security.jwt.secret=your-secret-key-change-in-production
security.jwt.expiration=86400000

# OpenAPI/Swagger
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
